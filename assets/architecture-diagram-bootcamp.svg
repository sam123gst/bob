<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" font-family="-apple-system, Segoe UI, sans-serif">

  <!-- Background -->
  <rect width="1000" height="420" fill="#e8f0fe" rx="16"/>

  <!-- Main container box -->
  <rect x="220" y="30" width="750" height="360" fill="#cfe0fc" rx="12" stroke="#a0bff5" stroke-width="1.5"/>
  <text x="590" y="58" fill="#1a3a6b" font-size="15" font-weight="700" text-anchor="middle">AI Governance Workshop — Agentic Architecture</text>

  <!-- ── NODE 1: User ── -->
  <circle cx="90" cy="210" r="48" fill="#5b4fcf"/>
  <text x="90" y="195" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">👤</text>
  <text x="90" y="212" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">Workshop</text>
  <text x="90" y="227" fill="#fff" font-size="11" text-anchor="middle">Attendee</text>

  <!-- Arrow 1 → 2 -->
  <line x1="140" y1="210" x2="188" y2="210" stroke="#1a3a6b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="164" y="204" fill="#1a3a6b" font-size="10" text-anchor="middle">①</text>

  <!-- ── NODE 2: Bob ── -->
  <rect x="192" y="168" width="100" height="84" fill="#ffffff" rx="10" stroke="#5b4fcf" stroke-width="2"/>
  <text x="242" y="196" fill="#5b4fcf" font-size="22" text-anchor="middle">🤖</text>
  <text x="242" y="216" fill="#1a3a6b" font-size="12" font-weight="700" text-anchor="middle">IBM Bob</text>
  <text x="242" y="232" fill="#57606a" font-size="10" text-anchor="middle">AI Coding</text>
  <text x="242" y="244" fill="#57606a" font-size="10" text-anchor="middle">Assistant</text>

  <!-- Arrow 2 → 3 -->
  <line x1="294" y1="210" x2="342" y2="210" stroke="#1a3a6b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="318" y="204" fill="#1a3a6b" font-size="10" text-anchor="middle">②</text>

  <!-- ── NODE 3: watsonx Orchestrate ── -->
  <rect x="346" y="130" width="160" height="160" fill="#dbeeff" rx="10" stroke="#3b82d4" stroke-width="2"/>
  <text x="426" y="158" fill="#3b82d4" font-size="11" font-weight="700" text-anchor="middle">watsonx Orchestrate</text>
  <!-- WXO logo circle -->
  <circle cx="426" cy="178" r="14" fill="#3b82d4"/>
  <text x="426" y="183" fill="#fff" font-size="13" text-anchor="middle">✦</text>
  <!-- Sub agents -->
  <rect x="362" y="198" width="128" height="22" fill="#b8d9f8" rx="4"/>
  <text x="426" y="213" fill="#1a3a6b" font-size="10" text-anchor="middle">🚗 Car Sales Assistant</text>
  <rect x="362" y="226" width="128" height="22" fill="#b8d9f8" rx="4"/>
  <text x="426" y="241" fill="#1a3a6b" font-size="10" text-anchor="middle">🔍 Web Search Agent</text>
  <rect x="362" y="254" width="128" height="22" fill="#b8d9f8" rx="4"/>
  <text x="426" y="269" fill="#1a3a6b" font-size="10" text-anchor="middle">🏪 Dealership Support</text>

  <!-- Arrow 3 → 4 -->
  <line x1="508" y1="210" x2="556" y2="210" stroke="#1a3a6b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="532" y="204" fill="#1a3a6b" font-size="10" text-anchor="middle">③</text>

  <!-- ── NODE 4: Agent Control Plane ── -->
  <rect x="560" y="130" width="150" height="160" fill="#e8f5e9" rx="10" stroke="#2e7d32" stroke-width="2"/>
  <text x="635" y="155" fill="#2e7d32" font-size="11" font-weight="700" text-anchor="middle">Agent Control</text>
  <text x="635" y="169" fill="#2e7d32" font-size="11" font-weight="700" text-anchor="middle">Plane</text>
  <circle cx="635" cy="185" r="14" fill="#2e7d32"/>
  <text x="635" y="190" fill="#fff" font-size="13" text-anchor="middle">⚙</text>
  <rect x="572" y="204" width="126" height="19" fill="#c8e6c9" rx="4"/>
  <text x="635" y="217" fill="#1b5e20" font-size="10" text-anchor="middle">📊 Analytics &amp; Alerts</text>
  <rect x="572" y="228" width="126" height="19" fill="#c8e6c9" rx="4"/>
  <text x="635" y="241" fill="#1b5e20" font-size="10" text-anchor="middle">🐞 Debugging</text>
  <rect x="572" y="252" width="126" height="19" fill="#c8e6c9" rx="4"/>
  <text x="635" y="265" fill="#1b5e20" font-size="10" text-anchor="middle">🔎 Evaluation</text>

  <!-- Arrow 4 → 5 -->
  <line x1="712" y1="210" x2="760" y2="210" stroke="#1a3a6b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="736" y="204" fill="#1a3a6b" font-size="10" text-anchor="middle">④</text>

  <!-- ── NODE 5: watsonx Governance ── -->
  <rect x="764" y="130" width="170" height="160" fill="#fff3e0" rx="10" stroke="#e65100" stroke-width="2"/>
  <text x="849" y="155" fill="#e65100" font-size="11" font-weight="700" text-anchor="middle">watsonx.governance</text>
  <circle cx="849" cy="175" r="14" fill="#e65100"/>
  <text x="849" y="180" fill="#fff" font-size="13" text-anchor="middle">🛡</text>
  <rect x="774" y="196" width="150" height="19" fill="#ffe0b2" rx="4"/>
  <text x="849" y="209" fill="#bf360c" font-size="10" text-anchor="middle">💉 Prompt Injection Guard</text>
  <rect x="774" y="220" width="150" height="19" fill="#ffe0b2" rx="4"/>
  <text x="849" y="233" fill="#bf360c" font-size="10" text-anchor="middle">🤢 HAP / Toxic Filter</text>
  <rect x="774" y="244" width="150" height="19" fill="#ffe0b2" rx="4"/>
  <text x="849" y="257" fill="#bf360c" font-size="10" text-anchor="middle">💧 PII Leakage Guard</text>
  <rect x="774" y="268" width="150" height="19" fill="#ffe0b2" rx="4"/>
  <text x="849" y="281" fill="#bf360c" font-size="10" text-anchor="middle">😵 Hallucination Check</text>

  <!-- Legend -->
  <text x="242" y="340" fill="#1a3a6b" font-size="10" text-anchor="middle">Deploys &amp; manages</text>
  <text x="242" y="353" fill="#1a3a6b" font-size="10" text-anchor="middle">agents via ADK CLI</text>
  <text x="426" y="340" fill="#1a3a6b" font-size="10" text-anchor="middle">Orchestrates car</text>
  <text x="426" y="353" fill="#1a3a6b" font-size="10" text-anchor="middle">dealership agents</text>
  <text x="635" y="340" fill="#1a3a6b" font-size="10" text-anchor="middle">Monitors, debugs</text>
  <text x="635" y="353" fill="#1a3a6b" font-size="10" text-anchor="middle">&amp; evaluates agents</text>
  <text x="849" y="340" fill="#1a3a6b" font-size="10" text-anchor="middle">Enforces guardrails</text>
  <text x="849" y="353" fill="#1a3a6b" font-size="10" text-anchor="middle">&amp; compliance</text>

  <!-- Step labels at bottom -->
  <text x="164" y="390" fill="#57606a" font-size="10" text-anchor="middle">① Ask Bob</text>
  <text x="318" y="390" fill="#57606a" font-size="10" text-anchor="middle">② Deploy/manage</text>
  <text x="532" y="390" fill="#57606a" font-size="10" text-anchor="middle">③ Govern agents</text>
  <text x="736" y="390" fill="#57606a" font-size="10" text-anchor="middle">④ Apply guardrails</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#1a3a6b"/>
    </marker>
  </defs>

</svg>
